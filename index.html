        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-bg { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .card-hover:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        /* Custom Install Prompt Styling */
        #installPrompt {
            display: none; /* Hidden by default */
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: calc(100% - 40px);
            max-width: 400px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        .logo-icon {
            background: #2563eb;
            box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.15);
        }

<body class="bg-slate-50 text-slate-900">

    <!-- Installation Popup -->
    <div id="installPrompt" class="bg-white border border-slate-200 shadow-2xl rounded-3xl p-6">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-14 h-14 logo-icon rounded-2xl flex items-center justify-center flex-shrink-0 border-4 border-white">
                <div class="w-7 h-7 border-4 border-white rounded-full"></div>
            </div>
            <div>
                <h4 class="font-bold text-lg text-slate-900">Install Petal Chain</h4>
                <p class="text-sm text-slate-500">Access university info instantly from your home screen.</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="btnInstall" class="flex-1 bg-blue-600 text-white py-3.5 rounded-2xl font-bold hover:bg-blue-700 active:scale-95 transition-all">
                Install Now
            </button>
            <button onclick="dismissInstall()" class="px-6 bg-slate-100 text-slate-600 py-3.5 rounded-2xl font-semibold hover:bg-slate-200 transition-all">
                Maybe Later
            </button>
        </div>
    </div>

    <!-- ... (Keep your existing Nav, Header, and Main content here) ... -->
    <nav class="bg-white/90 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 logo-icon rounded-2xl flex items-center justify-center shadow-lg border-4 border-white">
                    <div class="w-5 h-5 border-4 border-white rounded-full"></div>
                </div>
                <span class="text-3xl font-bold tracking-tighter text-slate-900">Petal Chain</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="universityGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        // --- DATA & UI LOGIC ---
        const universities = [
            { name: "University of Cape Town (UCT)", province: "Western Cape", link: "www.uct.ac.za", type: "Traditional" },
            { name: "University of the Witwatersrand (Wits)", province: "Gauteng", link: "www.wits.ac.za", type: "Traditional" },
            { name: "University of Johannesburg (UJ)", province: "Gauteng", link: "www.uj.ac.za", type: "Comprehensive" }
            // ... Add others as needed
        ];

        function displayUniversities(data) {
            const grid = document.getElementById('universityGrid');
            grid.innerHTML = data.map(univ => `
                <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm card-hover transition-all">
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-blue-100 text-blue-700">${univ.type}</span>
                    <h3 class="text-xl font-bold mt-4">${univ.name}</h3>
                    <p class="text-slate-500 text-sm mb-6">${univ.province}</p>
                    <a href="https://${univ.link}" target="_blank" class="block w-full py-3 rounded-xl bg-slate-900 text-white text-center font-bold">Visit Site</a>
                </div>
            `).join('');
        }

        // --- PWA INSTALLATION LOGIC ---
        let deferredPrompt;
        const installPromptDiv = document.getElementById('installPrompt');
        const btnInstall = document.getElementById('btnInstall');

        // Listen for the browser's install offer
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Show our custom UI
            installPromptDiv.style.display = 'block';
        });

        btnInstall.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            // Show the native browser install prompt
            deferredPrompt.prompt();
            
            // Wait for the user to respond to the prompt
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response to install: ${outcome}`);
            
            // We've used the prompt, and can't use it again
            deferredPrompt = null;
            installPromptDiv.style.display = 'none';
        });

        function dismissInstall() {
            installPromptDiv.style.display = 'none';
        }

        // Hide prompt if app is already installed
        window.addEventListener('appinstalled', () => {
            installPromptDiv.style.display = 'none';
            deferredPrompt = null;
            console.log('Petal Chain was installed');
        });

        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Using a Data URI for the service worker to keep it in one file for you
                const swCode = `
                    const CACHE_NAME = 'petal-chain-v1';
                    const ASSETS = ['/','/index.html'];
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'text/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob))
                    .then(() => console.log("Service Worker Registered"));
            });
        }

        window.onload = () => displayUniversities(universities);
    </script>
</body>
</html>
