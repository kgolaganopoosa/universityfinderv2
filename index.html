<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petal Chain - 2026 SA University Finder</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-bg { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        
        /* Icon Style: Blue background, white filled circle */
        .app-logo {
            background: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
        }
        .white-dot {
            background: white;
            border-radius: 50%;
            width: 45%;
            height: 45%;
        }

        #installPrompt {
            display: none;
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: calc(100% - 2rem);
            max-width: 420px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Installation Popup -->
    <div id="installPrompt" class="bg-white border border-slate-200 shadow-2xl rounded-3xl p-6 animate-bounce-in">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-14 h-14 app-logo shadow-lg">
                <div class="white-dot"></div>
            </div>
            <div>
                <h4 class="font-bold text-lg text-slate-900">Install Petal Chain</h4>
                <p class="text-sm text-slate-500">Access the 2026 directory from your home screen.</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="btnInstall" class="flex-1 bg-blue-600 text-white py-3.5 rounded-2xl font-bold hover:bg-blue-700 active:scale-95 transition-all">
                Install Now
            </button>
            <button onclick="dismissInstall()" class="px-6 bg-slate-100 text-slate-600 py-3.5 rounded-2xl font-semibold hover:bg-slate-200">
                Close
            </button>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <!-- Icon with Blue BG and White Circle -->
                <div class="w-10 h-10 app-logo">
                    <div class="white-dot"></div>
                </div>
                <span class="text-2xl font-bold tracking-tight">Petal Chain</span>
            </div>
            <button onclick="alert('Applications opening soon!')" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-semibold text-sm hover:bg-blue-700 transition-all">
                Apply 2026
            </button>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="hero-bg text-white py-20 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter mb-4">University Finder</h1>
        <p class="text-slate-400 max-w-xl mx-auto">Explore all 26 South African public universities for the 2026 academic year.</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-12 min-h-screen">
        <div id="universityGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Data will be injected here -->
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="bg-white border-t border-slate-200 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 app-logo">
                    <div class="white-dot"></div>
                </div>
                <span class="font-bold text-slate-900">Petal Chain 2026</span>
            </div>
            <div class="text-slate-500 text-sm">
                &copy; 2026 Official SA University Directory. All Rights Reserved.
            </div>
            <div class="flex gap-6 text-xl text-slate-400">
                <i class="fab fa-twitter hover:text-blue-500 cursor-pointer"></i>
                <i class="fab fa-facebook hover:text-blue-700 cursor-pointer"></i>
                <i class="fab fa-linkedin hover:text-blue-600 cursor-pointer"></i>
            </div>
        </div>
    </footer>

    <script>
        // PWA Logic - Fixing the Popup
        let deferredPrompt;
        const promptEl = document.getElementById('installPrompt');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI to notify the user they can add to home screen
            promptEl.style.display = 'block';
        });

        document.getElementById('btnInstall').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
                promptEl.style.display = 'none';
            }
        });

        function dismissInstall() {
            promptEl.style.display = 'none';
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }

        // Sample Data Injection (Partial list for example)
        const universities = [
            { name: "University of Cape Town", prov: "Western Cape" },
            { name: "Wits University", prov: "Gauteng" },
            { name: "University of Pretoria", prov: "Gauteng" }
        ];

        const grid = document.getElementById('universityGrid');
        grid.innerHTML = universities.map(u => `
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <h3 class="font-bold text-lg mb-2">${u.name}</h3>
                <p class="text-slate-500 text-sm"><i class="fas fa-map-marker-alt mr-2 text-blue-500"></i>${u.prov}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
